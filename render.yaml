services:
  # Backend Flask API (Docker)
  - type: web
    name: aqi-backend
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"

  # Frontend React App (Node.js)
  - type: web
    name: aqi-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npm install -g serve && serve -s frontend/build -l 3000
    envVars:
      - key: REACT_APP_API_URL
        value: https://aqi-backend.onrender.com/api
